<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Trening</title>
    <style>
        body{ margin:0; font-family:Arial,sans-serif; }
        menu{ background-color:#222222; padding:0; margin:0; }
        menu ul{ list-style:none; margin:0; padding:0; display:flex; justify-content:center; }
        menu ul li a{ display:block; color:#FFFFFF; padding:15px 25px; text-decoration:none; }
        menu ul li a:hover{ background-color:#555555; }
        .active{ background-color:#007BFF; }
        .kontener-user{ position:fixed; top:65px; right:20px; }
        .ikonka{ background-color:#FFFFFF; color:#000000; padding:12px; border-radius:12px; cursor:pointer; text-align:center; display:inline-block; font-size:30px; }
        .lista{ display:none; position:absolute; right:0; top:100%; padding-top:10px; }
        .lista-zawartosc{ background-color:#222222; border-radius:8px; overflow:hidden; min-width:150px; }
        .lista-zawartosc a{ display:block; padding:10px 15px; color:#FFFFFF; text-decoration:none; }
        .lista-zawartosc a:hover{ background-color:#555555; }
        .kontener-user:hover .lista{ display:block; }
        .box{ width:360px; margin:70px auto; background:#f5f5f5; padding:25px; border-radius:12px; }
        .pole{ margin-bottom:15px; }
        label{ display:block; font-weight:bold; margin-bottom:5px; }
        input{ width:100%; padding:10px; border:1px solid #ccc; border-radius:8px; box-sizing:border-box; }
        button,.btn{ display:inline-block; width:100%; padding:10px; border:none; background:#007BFF; color:white; border-radius:8px; font-weight:bold; cursor:pointer; text-align:center; text-decoration:none; box-sizing:border-box; }
        button:hover,.btn:hover{ background:#0056B3; }
        .flash{ padding:10px; border-radius:8px; margin-bottom:10px; }
        .test-box p{ font-size:14px; color:#555; }
    </style>
</head>
<body>
  <menu>
    <ul>
      <li><a href="{{ url_for('homepage') }}">Strona główna</a></li>
      <li><a href="{{ url_for('historia') }}">Historia treningów</a></li>
      <li><a href="{{ url_for('cwiczenia') }}">Ćwiczenia</a></li>
      <li><a href="{{ url_for('dodaj_trening') }}" class="active">Dodaj trening</a></li>
    </ul>
  </menu>

  <div class="kontener-user">
    <div class="ikonka">👤</div>
    <div class="lista">
      <div class="lista-zawartosc">
        <a href="{{ url_for('profil') }}">Profil</a>
        <a href="{{ url_for('logout') }}">Wyloguj się</a>
      </div>
    </div>
  </div>

  <div class="box">
    <h2>Dodaj trening</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post" action="{{ url_for('dodaj_trening') }}">
      <div class="pole">
        <label for="data">Data treningu:</label>
        <input type="date" id="data" name="data" value="{{ today }}" required>
      </div>
      <div class="pole">
        <label for="trwanie_treningu">Czas trwania w minutach:</label>
        <input type="number" id="trwanie_treningu" name="trwanie_treningu" min="1" placeholder="np. 60">
      </div>
      <button type="submit">Utwórz trening</button>
    </form>
  </div>
</body>
</html>
